name: "Publish"
# Promotes the draft release created by Draft on the same tag push.
# Logic lives in .github/scripts/promote-draft-release.sh (editor-friendly).
on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]?"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.0). Defaults to the ref name on tag push."
        required: false
        default: ""

permissions:
  contents: write

env:
  PROJECT_NAME: "rust_template"

jobs:
  publish:
    name: "Publish - promote draft"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout sources"
        uses: "actions/checkout@v7"

      - name: "Promote draft release"
        env:
          GH_TOKEN: "${{ github.token }}"
          INPUT_TAG: "${{ inputs.tag }}"
        shell: "bash"
        run: "bash .github/scripts/promote-draft-release.sh"
