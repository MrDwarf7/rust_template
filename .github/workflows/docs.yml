name: "Docs - Check & Generation"
on:
  push:
    branches:
      - "master"
      - "main"

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: "always"
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"
  PROJECT_NAME: "rust_template"

jobs:
  docs:
    name: "Docs - ${{ matrix.target }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "ubuntu-latest"
            target: "x86_64-unknown-linux-gnu"
          - os: "windows-latest"
            target: "x86_64-pc-windows-msvc"
    runs-on: "${{ matrix.os }}"
    steps:
      - name: "Checkout sources"
        uses: "actions/checkout@v7"

      - name: "Setup Rust"
        uses: "./.github/actions/setup-rust"
        with:
          target: "${{ matrix.target }}"

      - name: "Run Cargo Doc checks"
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: "cargo doc --no-deps --all-features --all --locked --target ${{ matrix.target }} --document-private-items"

  package-docs-unix:
    name: "Docs - package-docs-unix"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "ubuntu-latest"
            target: "x86_64-unknown-linux-gnu"
    runs-on: "${{ matrix.os }}"
    steps:
      - name: "Checkout sources"
        uses: "actions/checkout@v7"

      - name: "Setup Rust"
        uses: "./.github/actions/setup-rust"
        with:
          target: "${{ matrix.target }}"

      - name: "Run Cargo Doc generation"
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: "cargo doc --no-deps --all-features --all --locked --target ${{ matrix.target }} --document-private-items"

      - name: "Ensure Zip Installed on Unix"
        run: |
          if ! command -v zip &> /dev/null
          then
              sudo apt-get install zip
          fi
          zip --version

      - name: "Upload artifact"
        uses: "actions/upload-artifact@v7"
        with:
          name: "${{ env.PROJECT_NAME }}-${{ matrix.target }}-docs.zip"
          path: "target/${{ matrix.target }}/doc/"
          if-no-files-found: "error"
          compression-level: 9
          overwrite: true

  package-docs-windows:
    name: "Docs - package-docs-windows"
    strategy:
      matrix:
        include:
          - os: "windows-latest"
            target: "x86_64-pc-windows-msvc"
    runs-on: "${{ matrix.os }}"
    steps:
      - name: "Checkout sources"
        uses: "actions/checkout@v7"

      - name: "Setup Rust"
        uses: "./.github/actions/setup-rust"
        with:
          target: "${{ matrix.target }}"

      - name: "Run Cargo Doc generation"
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: "cargo doc --no-deps --all-features --all --locked --target ${{ matrix.target }} --document-private-items"

      - name: "Upload artifact"
        uses: "actions/upload-artifact@v7"
        with:
          name: "${{ env.PROJECT_NAME }}-${{ matrix.target }}-docs.zip"
          path: "target\\${{ matrix.target }}\\doc\\"
          if-no-files-found: "error"
          compression-level: 9
          overwrite: true

  publish-docs:
    name: "Docs - publish-docs"
    permissions:
      contents: write
    runs-on: "ubuntu-latest"
    needs: [package-docs-unix, package-docs-windows]
    steps:
      - name: "Generate docs body"
        run: |
          echo 'DOCS_BODY<<EOF' >> $GITHUB_ENV
          echo "From commit: ${GITHUB_SHA:0:8}" >> $GITHUB_ENV
          echo "Generated on: $(date -u +\"%Y-%m-%d %H:%M\") UTC" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: "Checkout sources"
        uses: "actions/checkout@v7"

      - name: "Download artifacts"
        uses: "actions/download-artifact@v8"
        id: "artifact-download-step"
        with:
          path: "docs-artifacts"
          merge-multiple: true

      - name: "Get directory structure"
        shell: "bash"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tree zip
          echo "PWD=$PWD"
          tree -afh docs-artifacts || ls -laR docs-artifacts

      - name: "Zip - Documentation"
        shell: "bash"
        run: |
          cd docs-artifacts
          zip -r "../${{ env.PROJECT_NAME }}-docs.zip" .
          cd ..
          ls -la "${{ env.PROJECT_NAME }}-docs.zip"

      # Recreate floating docs tag via API (no git push --force; no workflows scope).
      - name: "Drop existing docs release and tag"
        env:
          GH_TOKEN: "${{ github.token }}"
        run: |
          gh release delete docs --yes --cleanup-tag 2>/dev/null || true
          gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/docs" 2>/dev/null || true

      - name: "Docs - draft"
        uses: "softprops/action-gh-release@v3"
        with:
          tag_name: "docs"
          fail_on_unmatched_files: true
          draft: true
          make_latest: false
          files: "${{ env.PROJECT_NAME }}-docs.zip"
          name: "[${{ github.ref_name }} Docs]"
          body: "${{ env.DOCS_BODY }}"
          target_commitish: "${{ github.sha }}"
          generate_release_notes: false
